<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 70" fill="none">
    <!-- Text WUT — big bold -->
    <text x="0" y="42" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="40" letter-spacing="-1" fill="#ffffff">WUT</text>
    <!-- Text RACING — smaller below -->
    <text x="0" y="60" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="11" letter-spacing="4" fill="#ffffff">RACING</text>
    <!-- Open-wheel car silhouette on the right -->
    <g transform="translate(115, 10)" fill="#ffffff" stroke="#ffffff" stroke-width="0.5">
        <!-- Body bottom plane -->
        <path d="M 5 38 L 90 38 L 95 34 L 5 34 Z"/>
        <!-- Nose -->
        <path d="M 0 34 L 5 28 L 30 28 L 30 36 L 5 36 Z"/>
        <!-- Cockpit -->
        <path d="M 40 28 Q 48 16 60 16 L 70 16 Q 78 22 78 28 L 78 32 L 40 32 Z"/>
        <!-- Engine cover / airbox -->
        <path d="M 65 16 L 75 8 L 82 10 L 82 28 L 65 28 Z"/>
        <!-- Rear wing -->
        <path d="M 80 8 L 95 8 L 95 18 L 80 18 Z" fill="none" stroke-width="2"/>
        <!-- Front wheel -->
        <circle cx="22" cy="38" r="9" fill="#ffffff"/>
        <circle cx="22" cy="38" r="4" fill="#0a0a0a"/>
        <!-- Rear wheel -->
        <circle cx="78" cy="38" r="11" fill="#ffffff"/>
        <circle cx="78" cy="38" r="5" fill="#0a0a0a"/>
        <!-- Front wing -->
        <path d="M -2 38 L 12 38 L 12 42 L -2 42 Z" stroke-width="1.5"/>
    </g>
</svg>
